# Ansible Group Variables for OneView
# This file contains variables for OneView automation

---
# OneView Connection Configuration
oneview:
  hostname: "{{ oneview_hostname | default('oneview.local') }}"
  username: "{{ oneview_username | default('Administrator') }}"
  password: "{{ vault_oneview_password }}"
  api_version: "{{ oneview_api_version | default('3000') }}"
  validate_certs: false
  
# OneView API Settings
oneview_api:
  timeout: 30
  retries: 3
  retry_delay: 5
  
# Server Management Settings
server_management:
  default_action: "status"
  power_on_timeout: 300
  power_off_timeout: 60
  reset_timeout: 180
  
# Firmware Update Settings
firmware_update:
  default_mode: "FirmwareOnly"
  default_force: false
  update_timeout: 1800
  check_interval: 30
  max_retries: 60
  
# Profile Compliance Settings
profile_compliance:
  default_type: "full"
  remediation_timeout: 900
  consistency_check: true
  firmware_check: true
  network_check: true
  
# Security Settings
security:
  require_confirmation: true
  allowed_actions:
    - "status"
    - "info"
    - "health"
  restricted_actions:
    - "reset"
    - "power_off"
    - "firmware_update"
  
# Logging Configuration
logging:
  enabled: true
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/var/log/ansible/oneview.log"
  max_size: "10MB"
  backup_count: 5
  
# Reporting Configuration
reporting:
  enabled: true
  directory: "/var/log/ansible/reports"
  format: "txt"
  include_timestamp: true
  include_details: true
  
# Error Handling
error_handling:
  continue_on_error: false
  ignore_errors: false
  max_fail_percentage: 0
  
# Performance Settings
performance:
  serial_execution: true
  max_forks: 5
  timeout: 300
  
# Validation Settings
validation:
  validate_hostname: true
  validate_credentials: true
  validate_permissions: true
  
# Backup Settings
backup:
  enabled: true
  directory: "/var/backups/ansible/oneview"
  retention_days: 30
  compress: true
  
# Notification Settings
notifications:
  enabled: false
  email:
    smtp_server: "smtp.example.com"
    smtp_port: 587
    smtp_username: "ansible@example.com"
    smtp_password: "{{ vault_smtp_password }}"
    from_address: "ansible@example.com"
    to_addresses:
      - "admin@example.com"
  
# Debug Settings
debug:
  enabled: false
  verbose: false
  trace: false
  profile: false
  
# Testing Settings
testing:
  dry_run: false
  check_mode: false
  diff_mode: false
  
# Maintenance Settings
maintenance:
  maintenance_window: false
  start_time: "02:00"
  end_time: "04:00"
  timezone: "UTC"