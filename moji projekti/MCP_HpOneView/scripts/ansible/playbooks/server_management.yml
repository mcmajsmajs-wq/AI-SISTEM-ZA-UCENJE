---
# Ansible Playbook: OneView Server Management
# Description: Manages OneView server hardware operations
# Author: MCP_HpOneView Extended
# Version: 1.0

- name: "OneView Server Management"
  hosts: oneview_servers
  gather_facts: no
  vars:
    execution_timestamp: "{{ ansible_date_time.iso8601 }}"
    action: "{{ action | default('status') }}"
    server_name: "{{ server_name | default('all') }}"
    
  tasks:
    - name: "Initialize OneView connection"
      uri:
        url: "https://{{ oneview_hostname }}/rest/login-sessions"
        method: POST
        body_format: json
        body:
          userName: "{{ oneview_username }}"
          password: "{{ oneview_password }}"
        validate_certs: false
        status_code: [200, 201]
      register: oneview_session
      
    - name: "Extract session token"
      set_fact:
        oneview_session_token: "{{ oneview_session.json.sessionID }}"
    
    - name: "Get server hardware information"
      uri:
        url: "https://{{ oneview_hostname }}/rest/server-hardware"
        method: GET
        headers:
          Auth: "{{ oneview_session_token }}"
          X-Api-Version: "{{ oneview_api_version | default('3000') }}"
        validate_certs: false
      register: server_hardware
      
    - name: "Filter servers based on server_name"
      set_fact:
        target_servers: "{{ server_hardware.json.members | selectattr('name', 'equal', server_name) | list }}"
      when: server_name != "all"
    
    - name: "Use all servers if not specified"
      set_fact:
        target_servers: "{{ server_hardware.json.members }}"
      when: server_name == "all"
    
    - name: "Display server information"
      debug:
        msg:
          - "Action: {{ action }}"
          - "Target servers: {{ target_servers | length }}"
          - "Execution time: {{ execution_timestamp }}"
    
    - name: "Execute server status action"
      block:
        - name: "Get server status"
          debug:
            msg:
              - "Server: {{ item.name }}"
              - "Model: {{ item.model }}"
              - "Serial: {{ item.serialNumber }}"
              - "State: {{ item.state }}"
              - "Power state: {{ item.powerState }}"
              - "Status: {{ item.status }}"
          loop: "{{ target_servers }}"
          
        - name: "Create server status report"
          copy:
            content: |
              Server Status Report
              ===================
              Generated: {{ execution_timestamp }}
              Action: {{ action }}
              
              {% for server in target_servers %}
              Server: {{ server.name }}
              - Model: {{ server.model }}
              - Serial: {{ server.serialNumber }}
              - State: {{ server.state }}
              - Power: {{ server.powerState }}
              - Status: {{ server.status }}
              - IP: {{ server.ipAddress | default('N/A') }}
              - URI: {{ server.uri }}
              
              {% endfor %}
            dest: "reports/server_status_{{ ansible_date_time.date }}.txt"
          delegate_to: localhost
          
      when: action == "status"
    
    - name: "Execute server power control action"
      block:
        - name: "Power on servers"
          uri:
            url: "{{ item.uri }}/powerState"
            method: PUT
            headers:
              Auth: "{{ oneview_session_token }}"
              X-Api-Version: "{{ oneview_api_version | default('3000') }}"
            body_format: json
            body:
              powerState: "On"
            validate_certs: false
            status_code: [200, 202]
          loop: "{{ target_servers }}"
          register: power_result
          when: action == "power_on"
        
        - name: "Power off servers"
          uri:
            url: "{{ item.uri }}/powerState"
            method: PUT
            headers:
              Auth: "{{ oneview_session_token }}"
              X-Api-Version: "{{ oneview_api_version | default('3000') }}"
            body_format: json
            body:
              powerState: "Off"
            validate_certs: false
            status_code: [200, 202]
          loop: "{{ target_servers }}"
          register: power_result
          when: action == "power_off"
        
        - name: "Reset servers"
          uri:
            url: "{{ item.uri }}"
            method: POST
            headers:
              Auth: "{{ oneview_session_token }}"
              X-Api-Version: "{{ oneview_api_version | default('3000') }}"
            body_format: json
            body:
              resetType: "Force"
            validate_certs: false
            status_code: [200, 202]
          loop: "{{ target_servers }}"
          register: reset_result
          when: action == "reset"
        
        - name: "Display power control results"
          debug:
            msg:
              - "Action: {{ action }}"
              - "Server: {{ item.item.name }}"
              - "Result: {{ item.status }}"
              - "Message: {{ item.msg | default('No message') }}"
          loop: "{{ power_result.results if action in ['power_on', 'power_off'] else reset_result.results }}"
          
      when: action in ["power_on", "power_off", "reset"]
    
    - name: "Execute server information action"
      block:
        - name: "Get detailed server information"
          uri:
            url: "{{ item.uri }}"
            method: GET
            headers:
              Auth: "{{ oneview_session_token }}"
              X-Api-Version: "{{ oneview_api_version | default('3000') }}"
            validate_certs: false
          loop: "{{ target_servers }}"
          register: detailed_info
          when: action == "info"
        
        - name: "Display detailed server information"
          debug:
            msg:
              - "Server: {{ item.item.name }}"
              - "Model: {{ item.item.model }}"
              - "CPU: {{ item.item.processorCoreCount }} cores"
              - "Memory: {{ item.item.memoryMb }}MB"
              - "Storage: {{ item.item.storageControllerCount }} controllers"
              - "NICs: {{ item.item.portCount }} ports"
              - "Firmware: {{ item.item.firmware }}"
              - "State: {{ item.item.state }}"
              - "Status: {{ item.item.status }}"
          loop: "{{ detailed_info.results }}"
          when: action == "info"
          
      when: action == "info"
    
    - name: "Execute server health check action"
      block:
        - name: "Check server health"
          uri:
            url: "{{ item.uri }}/healthStatus"
            method: GET
            headers:
              Auth: "{{ oneview_session_token }}"
              X-Api-Version: "{{ oneview_api_version | default('3000') }}"
            validate_certs: false
          loop: "{{ target_servers }}"
          register: health_status
          when: action == "health"
        
        - name: "Display health status"
          debug:
            msg:
              - "Server: {{ item.item.name }}"
              - "Health: {{ item.item.status }}"
              - "State: {{ item.item.state }}"
              - "Message: {{ item.item.message | default('No health message') }}"
          loop: "{{ health_status.results }}"
          when: action == "health"
          
      when: action == "health"
    
    - name: "Logout from OneView"
      uri:
        url: "https://{{ oneview_hostname }}/rest/login-sessions/{{ oneview_session_token }}"
        method: DELETE
        headers:
          Auth: "{{ oneview_session_token }}"
          X-Api-Version: "{{ oneview_api_version | default('3000') }}"
        validate_certs: false
        status_code: [204, 404]
      always: true
      
    - name: "Log completion"
      debug:
        msg:
          - "=========================================="
          - "  SERVER MANAGEMENT COMPLETED"
          - "  Action: {{ action }}"
          - "  Servers: {{ target_servers | length }}"
          - "  Time: {{ ansible_date_time.time }}"
          - "=========================================="

  post_tasks:
    - name: "Create execution summary"
      copy:
        content: |
          Server Management Execution Summary
          ==================================
          Timestamp: {{ execution_timestamp }}
          Action: {{ action }}
          Target: {{ server_name | default('all') }}
          Servers Processed: {{ target_servers | length }}
          Status: {{ 'Completed' if ansible_failed is not defined else 'Failed' }}
          
          {% if ansible_failed is defined %}
          Failed Tasks:
          {% for task in ansible_failed %}
          - {{ task.name }}: {{ task.msg }}
          {% endfor %}
          {% endif %}
        dest: "reports/server_management_summary_{{ ansible_date_time.date }}.txt"
      delegate_to: localhost