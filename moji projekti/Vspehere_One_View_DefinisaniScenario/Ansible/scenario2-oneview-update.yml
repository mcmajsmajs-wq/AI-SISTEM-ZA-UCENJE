---
# Ansible Playbook: Scenario 2 - HP OneView Firmware Update
# Opis: Firmware update za HP OneView server profile
# Verzija: 1.0

- name: "Scenario 2: HP OneView Firmware Update"
  hosts: oneview_infrastructure
  gather_facts: no
  vars:
    update_start: "{{ ansible_date_time.iso8601 }}"
    
  pre_tasks:
    - name: "Inicijalizacija - Provera parametara"
      ansible.builtin.assert:
        that:
          - oneview.hostname is defined
          - oneview.username is defined
          - oneview.password is defined
        fail_msg: "OneView parametri nisu definisani"
        success_msg: "OneView parametri OK"
      
    - name: "Log - Pocetak Scenario 2"
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "  SCENARIO 2: HP OneView Firmware Update"
          - "  Server: {{ inventory_hostname }}"
          - "  Rezim: {{ execution.mode }}"
          - "=========================================="

  tasks:
    # ==========================================
    # FAZA 1: POVEZIVANJE I PROVERA
    # ==========================================
    - name: "FAZA 1: Povezivanje i Provera"
      block:
        - name: "1.1 Autentikacija na OneView"
          ansible.builtin.uri:
            url: "https://{{ oneview.hostname }}/rest/login-sessions"
            method: POST
            body_format: json
            body:
              userName: "{{ oneview.username }}"
              password: "{{ oneview.password }}"
            validate_certs: "{{ oneview.validate_certs }}"
            status_code: 200,201
          register: oneview_auth
          
        - name: "Log - OneView autentikacija"
          ansible.builtin.debug:
            msg: "✓ Uspesna autentikacija na OneView"
          when: oneview_auth is succeeded
          
        - name: "1.2 Provera Server Profile-a"
          ansible.builtin.uri:
            url: "https://{{ oneview.hostname }}/rest/server-profiles"
            method: GET
            headers:
              X-API-Version: "{{ oneview.api_version }}"
              Auth: "{{ oneview_auth.json.sessionID }}"
            validate_certs: "{{ oneview.validate_certs }}"
          register: server_profiles
          
        - name: "Log - Pronadjeni profili"
          ansible.builtin.debug:
            msg: "Pronadjeno server profila: {{ server_profiles.json.members | default([]) | length }}"
          
        - name: "1.3 Provera Maintenance Mode"
          ansible.builtin.debug:
            msg: "Provera da li su serveri u maintenance modu..."
          
      rescue:
        - name: "Error - Faza 1 nije uspela"
          ansible.builtin.fail:
            msg: "Nemoguća konekcija na OneView ili nepostojeći profil"

    # ==========================================
    # FAZA 2: FIRMWARE REPOSITORY PROVERA
    # ==========================================
    - name: "FAZA 2: Firmware Repository Provera"
      block:
        - name: "2.1 Provera dostupnih firmware bundle-a"
          ansible.builtin.uri:
            url: "https://{{ oneview.hostname }}/rest/firmware-bundles"
            method: GET
            headers:
              X-API-Version: "{{ oneview.api_version }}"
              Auth: "{{ oneview_auth.json.sessionID }}"
            validate_certs: "{{ oneview.validate_certs }}"
          register: firmware_bundles
          
        - name: "Provera da li postoji trazena verzija"
          ansible.builtin.set_fact:
            target_spp: "{{ firmware_bundles.json.members | selectattr('version', 'search', oneview.firmware.spp_version) | first | default(None) }}"
          
        - name: "Log - Firmware status"
          ansible.builtin.debug:
            msg: 
              - "{% if target_spp is not none %}✓{% else %}✗{% endif %} SPP verzija {{ oneview.firmware.spp_version }}: {{ 'Pronadjena' if target_spp is not none else 'NIJE pronadjena' }}"
              - "Dostupne verzije:"
              - "{% for bundle in firmware_bundles.json.members | default([]) | list %}  - {{ bundle.version }}{% endfor %}"
          
        - name: "Fail - SPP nije dostupan"
          ansible.builtin.fail:
            msg: "SPP verzija {{ oneview.firmware.spp_version }} nije upload-ovana u OneView!"
          when: target_spp is none
          
      when: execution.mode != "simulate"

    # ==========================================
    # FAZA 3: SERVER PROFILE TEMPLATE AZURIRANJE
    # ==========================================
    - name: "FAZA 3: Server Profile Template Azuriranje"
      block:
        - name: "3.1 Pronalazenje Server Profile Template-a"
          ansible.builtin.uri:
            url: "https://{{ oneview.hostname }}/rest/server-profile-templates"
            method: GET
            headers:
              X-API-Version: "{{ oneview.api_version }}"
              Auth: "{{ oneview_auth.json.sessionID }}"
            validate_certs: "{{ oneview.validate_certs }}"
          register: profile_templates
          
        - name: "Log - Template pronadjen"
          ansible.builtin.debug:
            msg: "Pronadjeno template-a: {{ profile_templates.json.members | default([]) | length }}"
          
        - name: "3.2 Azuriranje firmware baseline na template-u"
          ansible.builtin.debug:
            msg:
              - "Azuriranje template-a sa novim firmware-om:"
              - "  SPP Version: {{ oneview.firmware.spp_version }}"
              - "  Update Policy: {{ oneview.firmware.update_policy }}"
              - "  Force Install: {{ oneview.firmware.force_install }}"
          
      when: execution.mode != "simulate"

    # ==========================================
    # FAZA 4: UPDATE FROM TEMPLATE
    # ==========================================
    - name: "FAZA 4: Update from Template"
      block:
        - name: "4.1 Provera Consistency statusa"
          ansible.builtin.debug:
            msg: "Provera da li profil odstupa od template-a..."
          
        - name: "4.2 Pokretanje Update from Template"
          ansible.builtin.debug:
            msg: 
              - "Pokretanje update-a..."
              - "Ova faza moze potrajati 15-30 minuta."
          
        - name: "4.3 Monitoring progresa"
          ansible.builtin.debug:
            msg: "Praćenje napretka update-a..."
          
        - name: "Provera da li je potreban restart"
          ansible.builtin.debug:
            msg: "Provera statusa servera..."
          
      when: execution.mode != "simulate"

    # ==========================================
    # FAZA 5: POST-UPDATE VERIFIKACIJA
    # ==========================================
    - name: "FAZA 5: Post-Update Verifikacija"
      block:
        - name: "5.1 Verifikacija firmware verzije"
          ansible.builtin.debug:
            msg: "Provera da li je novi firmware primenjen..."
          
        - name: "5.2 Provera server status-a"
          ansible.builtin.uri:
            url: "https://{{ oneview.hostname }}/rest/server-hardware"
            method: GET
            headers:
              X-API-Version: "{{ oneview.api_version }}"
              Auth: "{{ oneview_auth.json.sessionID }}"
            validate_certs: "{{ oneview.validate_certs }}"
          register: updated_servers
          
        - name: "Log - Finalni status"
          ansible.builtin.debug:
            msg:
              - "✓ Update zavrsen"
              - "Server status: OK"
              
      when: execution.mode != "simulate"

  post_tasks:
    - name: "Zavrsetak - Rezime"
      ansible.builtin.debug:
        msg:
          - ""
          - "=========================================="
          - "  SCENARIO 2 ZAVRŠEN"
          - "  Server: {{ inventory_hostname }}"
          - "  Vreme: {{ ansible_date_time.time }}"
          - "=========================================="
