---
# Ansible Playbook: Master Orchestrator
# Opis: Glavni playbook koji orkestrira sve akcije
# Verzija: 1.0

- name: "Master Orchestrator - Inicijalizacija"
  hosts: localhost
  gather_facts: yes
  tasks:
    - name: "Provera parametara"
      ansible.builtin.assert:
        that:
          - action is defined
          - action in ['daily-scan', 'scenario1', 'scenario2', 'scenario3', 'scenario4', 'full-workflow']
        fail_msg: "Morate definisati action parametar. Validne vrednosti: daily-scan, scenario1, scenario2, scenario3, scenario4, full-workflow"
        success_msg: "Action: {{ action }}"
      
    - name: "Kreiranje direktorijuma"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ reporting.path }}"
        - "{{ logging.path }}"
        - "{{ backup_host_path }}"
        - "{{ backup_vcenter_path }}"

    - name: "Log - Master Orchestrator pokrenut"
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "  MASTER ORCHESTRATOR"
          - "  Action: {{ action }}"
          - "  Rezim: {{ execution.mode }}"
          - "  Datum: {{ ansible_date_time.date }}"
          - "=========================================="

# Pozivanje odgovarajuceg playbook-a na osnovu action parametra
- name: "Pokretanje Daily Scan"
  ansible.builtin.import_playbook: daily-scan.yml
  when: action == 'daily-scan'

- name: "Pokretanje Scenario 1"
  ansible.builtin.import_playbook: scenario1-vmware-patching.yml
  when: action == 'scenario1'

- name: "Pokretanje Scenario 2"
  ansible.builtin.import_playbook: scenario2-oneview-update.yml
  when: action == 'scenario2'

- name: "Pokretanje Scenario 3 (Kombinovani)"
  ansible.builtin.import_playbook: scenario3-combined.yml
  when: action == 'scenario3'

- name: "Pokretanje Scenario 4 (Klaster)"
  ansible.builtin.import_playbook: scenario4-cluster-patching.yml
  when: action == 'scenario4'

- name: "Pokretanje Full Workflow"
  ansible.builtin.import_playbook: full-workflow.yml
  when: action == 'full-workflow'
