---
# Ansible Playbook: Scenario 1 - VMware vCenter Patching
# Opis: Kompletan patching proces za ESXi hostove
# Napomena: Backup appliance se SAMO proverava, ne kreira automatski
# Verzija: 1.0

- name: "Scenario 1: VMware vCenter Patching"
  hosts: vmware_hosts
  gather_facts: no
  serial: 1  # Jedan host u isto vreme
  vars:
    patching_start: "{{ ansible_date_time.iso8601 }}"
    
  pre_tasks:
    - name: "Inicijalizacija - Provera parametara"
      ansible.builtin.assert:
        that:
          - vmware.vcenter.hostname is defined
          - vmware.vcenter.username is defined
          - vmware.vcenter.password is defined
        fail_msg: "VMware parametri nisu definisani"
        success_msg: "VMware parametri OK"
      
    - name: "Log - Pocetak Scenario 1"
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "  SCENARIO 1: VMware vCenter Patching"
          - "  Host: {{ inventory_hostname }}"
          - "  Rezim: {{ execution.mode }}"
          - "=========================================="

  tasks:
    # ==========================================
    # FAZA 1: PRE-CHECKS (Priprema)
    # ==========================================
    - name: "FAZA 1: Pre-Checks"
      block:
        - name: "1.1 Povezivanje na vCenter"
          community.vmware.vmware_about_info:
            hostname: "{{ vmware.vcenter.hostname }}"
            username: "{{ vmware.vcenter.username }}"
            password: "{{ vmware.vcenter.password }}"
            validate_certs: "{{ vmware.vcenter.validate_certs }}"
          register: vcenter_connection
          
        - name: "Log - vCenter povezan"
          ansible.builtin.debug:
            msg: "✓ Povezan na vCenter: {{ vcenter_connection.about_info.fullName }}"
          
        - name: "1.2 BACKUP PROVERA - Appliance"
          ansible.builtin.debug:
            msg: 
              - "🔄 PROVERA BACKUP-A APPLIANCE"
              - "  Napomena: Backup appliance je dnevna aktivnost"
              - "  Ovde samo proveravamo da li postoji..."
          
        - name: "Provera da li postoji backup appliance-a"
          ansible.builtin.stat:
            path: "{{ backup_vcenter_path }}"
          register: vcenter_backup_dir
          delegate_to: localhost
          
        - name: "Pronalazenje recentnih backup-a appliance-a"
          ansible.builtin.find:
            paths: "{{ backup_vcenter_path }}"
            patterns: "*.bak"
            age: "24h"
          register: vcenter_backups
          delegate_to: localhost
          
        - name: "Log - Status backup-a appliance-a"
          ansible.builtin.debug:
            msg: 
              - "{% if vcenter_backups.files | length > 0 %}✓{% else %}⚠{% endif %} Backup appliance-a: {{ vcenter_backups.files | length }} fajlova (poslednjih 24h)"
              - "  Napomena: Ako nema backup-a, to je upozorenje ali ne prekidamo"
              - "  Backup appliance-a se radi dnevno odvojeno od patching-a"
          
        - name: "1.3 BACKUP PROVERA - Host"
          ansible.builtin.debug:
            msg: "🔄 PROVERA BACKUP-A HOSTA: {{ inventory_hostname }}"
          
        - name: "Provera da li postoji backup hosta"
          ansible.builtin.stat:
            path: "{{ backup_host_path }}/{{ inventory_hostname }}"
          register: host_backup_dir
          delegate_to: localhost
          
        - name: "Pronalazenje recentnih backup-a hosta"
          ansible.builtin.find:
            paths: "{{ backup_host_path }}/{{ inventory_hostname }}"
            patterns: "*.tgz"
            age: "24h"
          register: host_backups
          delegate_to: localhost
          ignore_errors: yes
          
        - name: "Provera rezultata backup-a"
          ansible.builtin.set_fact:
            has_recent_backup: "{{ host_backups.files | default([]) | length > 0 }}"
          
        - name: "UPOZORENJE - Nema recentnog backup-a hosta"
          ansible.builtin.debug:
            msg:
              - "⚠️  UPozorenje: Host {{ inventory_hostname }} nema backup (poslednjih 24h)!"
              - "    Lokacija: {{ backup_host_path }}/{{ inventory_hostname }}"
          when: not has_recent_backup
          
        - name: "ZAUSTAVLJANJE - Nema backup-a u Production rezimu"
          ansible.builtin.fail:
            msg: 
              - "🚨 KRITIČNO: Host {{ inventory_hostname }} nema backup!"
              - "   Patching NE MOZE nastaviti bez backup-a."
              - "   Molim kreirajte backup rucno ili pokrenite skriptu za backup."
          when: 
            - not has_recent_backup
            - execution.mode == "production"
          
        - name: "Kreiranje backup-a (ako je omoguceno)"
          block:
            - name: "Kreiranje direktorijuma za backup"
              ansible.builtin.file:
                path: "{{ backup_host_path }}/{{ inventory_hostname }}"
                state: directory
                mode: '0755'
              delegate_to: localhost
              
            - name: "Export host konfiguracije"
              community.vmware.vmware_host_config_info:
                hostname: "{{ vmware.vcenter.hostname }}"
                username: "{{ vmware.vcenter.username }}"
                password: "{{ vmware.vcenter.password }}"
                esxi_hostname: "{{ inventory_hostname }}"
                validate_certs: "{{ vmware.vcenter.validate_certs }}"
              register: host_config
              
            - name: "Cuvanje backup konfiguracije"
              ansible.builtin.copy:
                content: "{{ host_config | to_nice_json }}"
                dest: "{{ backup_host_path }}/{{ inventory_hostname }}/{{ inventory_hostname }}_{{ ansible_date_time.date }}.json"
                mode: '0644'
              delegate_to: localhost
              
          when: 
            - not has_recent_backup
            - execution.mode == "production"
            - vmware.hosts.backup.enabled | default(false)
            - not vmware.hosts.backup.check_only | default(true)
          
        - name: "1.4 Provera resursa"
          community.vmware.vmware_host_facts:
            hostname: "{{ vmware.vcenter.hostname }}"
            username: "{{ vmware.vcenter.username }}"
            password: "{{ vmware.vcenter.password }}"
            esxi_hostname: "{{ inventory_hostname }}"
            validate_certs: "{{ vmware.vcenter.validate_certs }}"
          register: host_facts
          
        - name: "Log - Resursi hosta"
          ansible.builtin.debug:
            msg:
              - "CPU Usage: {{ host_facts.ansible_facts.processor_usage_percent }}%"
              - "Memory Usage: {{ host_facts.ansible_facts.memory_usage_percent }}%"
              
      rescue:
        - name: "Error - Pre-checks nisu prosli"
          ansible.builtin.fail:
            msg: "Faza 1 (Pre-Checks) nije uspela. Prekidam patching."

    # ==========================================
    # FAZA 2: LIFECYCLE MANAGER
    # ==========================================
    - name: "FAZA 2: Lifecycle Manager"
      block:
        - name: "2.1 Sync Updates"
          ansible.builtin.debug:
            msg: "Sinhronizacija updates sa VMware portalom..."
          
        - name: "2.2 Baseline provera"
          ansible.builtin.debug:
            msg: "Provera baseline-a: {{ vmware.patching.baseline.name }}"
          
        - name: "2.3 Baseline Attachment"
          ansible.builtin.debug:
            msg: "Povezivanje baseline-a sa hostom {{ inventory_hostname }}"
          
      when: execution.mode != "simulate"

    # ==========================================
    # FAZA 3: COMPLIANCE CHECK
    # ==========================================
    - name: "FAZA 3: Compliance Check"
      block:
        - name: "3.1 Provera compliance statusa"
          ansible.builtin.debug:
            msg: "Provera da li host vec ima sve zakrpe..."
          
        - name: "Provera rezultata"
          ansible.builtin.set_fact:
            is_compliant: false  # Simulacija - u praksi proveriti
          
        - name: "Host je compliant - nema potrebe za patching-om"
          ansible.builtin.debug:
            msg: "✓ Host je compliant. Preskacem patching."
          when: is_compliant
          
        - name: "End play - Host compliant"
          meta: end_host
          when: is_compliant
          
      when: execution.mode != "simulate"

    # ==========================================
    # FAZA 4: STAGING
    # ==========================================
    - name: "FAZA 4: Staging"
      block:
        - name: "4.1 Pre-remediation check"
          ansible.builtin.debug:
            msg: 
              - "Pre-remediation provera:"
              - "  - DRS status"
              - "  - HA status"
              - "  - Diskonektovani uredjaji"
          
        - name: "4.2 Staging zakrpa"
          ansible.builtin.debug:
            msg: "Kopiranje fajlova zakrpa na host..."
          
      when: execution.mode != "simulate"

    # ==========================================
    # FAZA 5: BACKUP PROVERA I REMEDIATION
    # ==========================================
    - name: "FAZA 5: Backup Provera i Remediation"
      block:
        - name: "🔄 FINALNA BACKUP PROVERA"
          ansible.builtin.debug:
            msg:
              - "=========================================="
              - "  FINALNA PROVERA PRE PATCHING-A"
              - "=========================================="
              - "  Host: {{ inventory_hostname }}"
              - "  Backup proveren: {{ has_recent_backup }}"
              - "=========================================="
          
        - name: "5.1 Ulazak u Maintenance Mode"
          community.vmware.vmware_maintenancemode:
            hostname: "{{ vmware.vcenter.hostname }}"
            username: "{{ vmware.vcenter.username }}"
            password: "{{ vmware.vcenter.password }}"
            esxi_hostname: "{{ inventory_hostname }}"
            state: present
            evacuate: yes
            timeout: "{{ vmware.patching.phases.remediation.maintenance_mode_timeout }}"
            validate_certs: "{{ vmware.vcenter.validate_certs }}"
          when: execution.mode == "production"
          
        - name: "5.2 Remediation (patching)"
          ansible.builtin.debug:
            msg: 
              - "Instalacija zakrpa na hostu {{ inventory_hostname }}..."
              - "⚠️  Host ce se restartovati!"
          when: execution.mode == "production"
          
        - name: "5.3 Cekanje na restart"
          ansible.builtin.wait_for:
            host: "{{ inventory_hostname }}"
            port: 443
            state: started
            delay: 60
            timeout: 900
          when: execution.mode == "production"
          
      when: execution.mode != "simulate"

    # ==========================================
    # FAZA 6: POST-PATCH VERIFICATION
    # ==========================================
    - name: "FAZA 6: Post-Patch Verification"
      block:
        - name: "6.1 Provera compliance nakon patching-a"
          ansible.builtin.debug:
            msg: "Provera da li je patching uspeo..."
          
        - name: "6.2 Verifikacija build verzije"
          ansible.builtin.debug:
            msg: "Provera verzije ESXi nakon patching-a..."
          
        - name: "6.3 Izlazak iz Maintenance Mode"
          community.vmware.vmware_maintenancemode:
            hostname: "{{ vmware.vcenter.hostname }}"
            username: "{{ vmware.vcenter.username }}"
            password: "{{ vmware.vcenter.password }}"
            esxi_hostname: "{{ inventory_hostname }}"
            state: absent
            timeout: 600
            validate_certs: "{{ vmware.vcenter.validate_certs }}"
          when: execution.mode == "production"
          
        - name: "6.4 vMotion Test"
          ansible.builtin.debug:
            msg: "Test migracije VM-ova..."
          
        - name: "6.5 Provera VMware Tools"
          ansible.builtin.debug:
            msg: "Provera verzije VMware Tools na VM-ovima..."
          
      when: execution.mode != "simulate"

  post_tasks:
    - name: "Zavrsetak - Rezime"
      ansible.builtin.debug:
        msg:
          - ""
          - "=========================================="
          - "  SCENARIO 1 ZAVRŠEN"
          - "  Host: {{ inventory_hostname }}"
          - "  Vreme: {{ ansible_date_time.time }}"
          - "=========================================="
