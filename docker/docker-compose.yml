# ================================================================================
# DOCKER COMPOSE - AI LEARNING SYSTEM
# ================================================================================
# Ovaj fajl definiše sve servise potrebne za pokretanje aplikacije
# Verzija: 1.0.0
# Autor: AI Learning System Team
# Datum: 2024
# ================================================================================

services:
  # ================================================================================
  # GLAVNA APLIKACIJA (FastAPI)
  # ================================================================================
  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ai-learning-app
    restart: unless-stopped
    mem_limit: 2g
    user: root
    working_dir: /app
    command: >
      sh -c "mkdir -p /app/logs && chmod 777 /app/logs /app/uploads && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    volumes:
      # Persistovanje upload-ova (lokalni storage)
      - uploads-data:/app/uploads
      # Development hot-reload
      - ../backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      ai-learning-network:
        aliases:
          - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service_name,environment"

  # ================================================================================
  # DATABASE (PostgreSQL 15)
  # ================================================================================
  db:
    image: pgvector/pgvector:pg15
    container_name: ai-learning-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Backup direktorijum
      - ../backups:/backups
    ports:
      - "5432:5432"
    networks:
      - ai-learning-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ================================================================================
  # REDIS (Cache i Message Broker)
  # ================================================================================
  redis:
    image: redis:7-alpine
    container_name: ai-learning-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ai-learning-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ================================================================================
  # CELERY WORKER (Background Tasks)
  # ================================================================================
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ai-learning-worker
    restart: unless-stopped
    mem_limit: 4g
    user: root
    command: >
      sh -c "chmod 777 /app/uploads && su appuser -s /bin/sh -c 'celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q pdf_processing,translation,quiz_generation,default'"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - LOG_LEVEL=INFO
      - STORAGE_BACKEND=s3
      - CLOUD_STORAGE_ENDPOINT=http://minio:9000
      - CLOUD_STORAGE_ACCESS_KEY=minioadmin
      - CLOUD_STORAGE_SECRET_KEY=minioadmin123
      - CLOUD_STORAGE_BUCKET_NAME=ai-learning-uploads
      - CLOUD_STORAGE_USE_SSL=false
      - MINIO_PUBLIC_URL=http://localhost:8090/minio
      - CELERY_TASK_TIME_LIMIT=7200
      - CELERY_TASK_SOFT_TIME_LIMIT=6800
    volumes:
      - ../logs:/app/logs
      - uploads-data:/app/uploads
      - ../backend/app:/app/app
    depends_on:
      - db
      - redis
    networks:
      - ai-learning-network
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ================================================================================
  # CELERY BEAT (Scheduled Tasks)
  # ================================================================================
  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ai-learning-beat
    restart: unless-stopped
    mem_limit: 1g
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - STORAGE_BACKEND=s3
      - CLOUD_STORAGE_ENDPOINT=http://minio:9000
      - CLOUD_STORAGE_ACCESS_KEY=minioadmin
      - CLOUD_STORAGE_SECRET_KEY=minioadmin123
      - CLOUD_STORAGE_BUCKET_NAME=ai-learning-uploads
      - CLOUD_STORAGE_USE_SSL=false
      - MINIO_PUBLIC_URL=http://localhost:8090/minio
    volumes:
      - ../logs:/app/logs
      - ../backend/app:/app/app
    depends_on:
      - db
      - redis
    networks:
      - ai-learning-network
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ================================================================================
  # ================================================================================
  # MINIO (Object Storage - S3 Compatible) — OPCIONO, CLOUD STORAGE
  # ================================================================================
  minio:
    image: minio/minio:latest
    container_name: ai-learning-minio
    restart: unless-stopped
    mem_limit: 1g
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:9003
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-data:/data
    networks:
      - ai-learning-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ================================================================================
  # OLLAMA (Local AI LLM)
  # ================================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ai-learning-ollama
    restart: unless-stopped
    mem_limit: 4g
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-learning-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  # ================================================================================
  # NGINX (Reverse Proxy)
  # ================================================================================
  nginx:
    image: nginx:alpine
    container_name: ai-learning-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
      - "9443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ../logs/nginx:/var/log/nginx
      - ../frontend/dist:/usr/share/nginx/html:rw
    depends_on:
      - app
    networks:
      - ai-learning-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ================================================================================
  # PROMETHEUS (Metrics Collection)
  # ================================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-learning-prometheus
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - ai-learning-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ================================================================================
  # GRAFANA (Metrics Visualization)
  # ================================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: ai-learning-grafana
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - ai-learning-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# ================================================================================
# MCP SERVER (AI Model Context Protocol)
# ================================================================================
# MCP Server omogućava AI asistentima direktan pristup aplikaciji
# Tool-ovi: quiz, document, translate, skills
# ================================================================================
  mcp:
    build:
      context: ../mcp-server
      dockerfile: Dockerfile
    container_name: ai-learning-mcp
    restart: unless-stopped
    environment:
      - API_BASE_URL=http://ai-learning-app:8000
      - PYTHONUNBUFFERED=1
      # Project root za MCP - putanja do projekta
      - PROJECT_ROOT=/project
    volumes:
      # Povezivanje sa glavnim projektom za pristup docker-compose.yml
      - ..:/project:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ai-learning-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# ================================================================================
# VOLUMES (Persistent Storage)
# ================================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  uploads-data:        # Lokalni upload storage (zamenjuje MinIO za development)
    driver: local
  ollama-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  minio-data:
    driver: local

# ================================================================================
# NETWORKS
# ================================================================================
networks:
  ai-learning-network:
    name: ai-learning-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

