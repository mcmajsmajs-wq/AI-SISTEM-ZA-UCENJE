# ================================================================================
# CD — Continuous Deployment workflow
# ================================================================================
# Pokreće se pri push-u na main granu (→ staging) ili pri kreaciji v* taga (→ produkcija).
#
# Opcija B (Docker Hub push) je potpuno opcionalna — jobovi se preskakaju ako
# secrets DOCKER_HUB_USERNAME / DOCKER_HUB_TOKEN nisu podešeni.
#
# Potrebni GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   Docker Hub (opcionalno):
#     DOCKER_HUB_USERNAME   — Docker Hub korisničko ime
#     DOCKER_HUB_TOKEN      — Docker Hub Access Token
#
#   Staging (opcionalno):
#     STAGING_SSH_HOST      — IP ili hostname staging servera
#     STAGING_SSH_USER      — SSH korisničko ime
#     STAGING_SSH_KEY       — Privatni SSH ključ (PEM format)
#     STAGING_SSH_PORT      — SSH port (default: 22)
#     STAGING_APP_DIR       — Putanja do projekta na serveru
#
#   Produkcija (opcionalno):
#     PRODUCTION_SSH_HOST   — IP ili hostname produkcijskog servera
#     PRODUCTION_SSH_USER   — SSH korisničko ime
#     PRODUCTION_SSH_KEY    — Privatni SSH ključ (PEM format)
#     PRODUCTION_SSH_PORT   — SSH port (default: 22)
#     PRODUCTION_APP_DIR    — Putanja do projekta na serveru
# ================================================================================

name: CD - Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'

# Osigurava da se ne pokreću dva deploya istovremeno
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Provjera konfiguracije — određuje koji jobovi trebaju da se pokrenu
  # ────────────────────────────────────────────────────────────────────────────
  check-config:
    name: Provjera konfiguracije
    runs-on: ubuntu-latest
    outputs:
      has_docker_hub: ${{ steps.check.outputs.has_docker_hub }}
      has_staging: ${{ steps.check.outputs.has_staging }}
      has_production: ${{ steps.check.outputs.has_production }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Provjera dostupnih secrets
        id: check
        env:
          HAS_DOCKER_HUB: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_TOKEN != '' }}
          HAS_STAGING: ${{ secrets.STAGING_SSH_HOST != '' && secrets.STAGING_SSH_KEY != '' }}
          HAS_PRODUCTION: ${{ secrets.PRODUCTION_SSH_HOST != '' && secrets.PRODUCTION_SSH_KEY != '' }}
        run: |
          echo "has_docker_hub=$HAS_DOCKER_HUB" >> "$GITHUB_OUTPUT"
          echo "has_staging=$HAS_STAGING" >> "$GITHUB_OUTPUT"
          echo "has_production=$HAS_PRODUCTION" >> "$GITHUB_OUTPUT"

          echo "### Konfiguracija deploya" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret group | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Hub | $( [ '$HAS_DOCKER_HUB' = 'true' ] && echo '✅ konfigurisan' || echo '⏭ preskočen' ) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Staging SSH | $( [ '$HAS_STAGING' = 'true' ] && echo '✅ konfigurisan' || echo '⏭ preskočen' ) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Production SSH | $( [ '$HAS_PRODUCTION' = 'true' ] && echo '✅ konfigurisan' || echo '⏭ preskočen' ) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Određivanje image taga
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push: refs/tags/v1.2.3 → v1.2.3
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG="latest"
          else
            TAG="${GITHUB_REF#refs/heads/}"
            # Sanitizacija — zamijena / i # sa -
            TAG="${TAG//\//-}"
            TAG="${TAG//#/-}"
          fi
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "**Image tag:** \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────────
  # Build i push Docker images na Docker Hub (opcionalno)
  # ────────────────────────────────────────────────────────────────────────────
  docker-push:
    name: Push na Docker Hub
    runs-on: ubuntu-latest
    needs: check-config
    if: needs.check-config.outputs.has_docker_hub == 'true'

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Podešavanje Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login na Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Određivanje tagova za Docker images
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/ai-learning-backend
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ needs.check-config.outputs.image_tag }}

      - name: Određivanje tagova za frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/ai-learning-frontend
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ needs.check-config.outputs.image_tag }}

      - name: Build i push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build i push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sažetak buildova
        run: |
          echo "### Docker images pushani" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend: \`${{ secrets.DOCKER_HUB_USERNAME }}/ai-learning-backend:${{ needs.check-config.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: \`${{ secrets.DOCKER_HUB_USERNAME }}/ai-learning-frontend:${{ needs.check-config.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy na Staging server (pri push-u na main)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [check-config, docker-push]
    # Pokreni ako je push na main I ako su staging secrets konfigurisani
    # Ako docker-push nije pokrenut (nema Docker Hub), and dalje možemo deployati
    if: |
      always() &&
      (needs.docker-push.result == 'success' || needs.docker-push.result == 'skipped') &&
      needs.check-config.outputs.has_staging == 'true' &&
      (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'))
    environment:
      name: staging

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Deploy na staging via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          # Timeout za konekciju i izvršavanje
          connect_timeout: 30s
          command_timeout: 10m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.STAGING_APP_DIR }}"
            IMAGE_TAG="${{ needs.check-config.outputs.image_tag }}"

            echo "========================================="
            echo " AI Learning System — Staging Deploy"
            echo " Tag: $IMAGE_TAG"
            echo " Datum: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "========================================="

            # Prelazak u direktorij projekta
            cd "$APP_DIR"

            # Čuvanje trenutnog commit-a za eventualni rollback
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "Prethodni commit: $PREVIOUS_COMMIT"

            # Dohvatanje najnovijeg koda
            echo "→ git pull..."
            git fetch origin
            git reset --hard origin/main

            # Dohvatanje novih Docker images (ako su na registriju)
            echo "→ docker compose pull..."
            cd docker
            docker compose -f docker-compose.prod.yml pull || true

            # Restart servisa bez downtime-a (--no-deps za postepeni restart)
            echo "→ Restart servisa..."
            IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            # Čišćenje starih images
            docker image prune -f

            echo "✅ Deploy završen!"

      - name: Health check staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          connect_timeout: 30s
          command_timeout: 2m
          script: |
            set -euo pipefail
            echo "→ Čekanje da servisi postanu dostupni (30s)..."
            sleep 30

            # Health check petlja
            MAX_RETRIES=5
            RETRY_INTERVAL=10
            for i in $(seq 1 $MAX_RETRIES); do
              echo "Health check pokušaj $i/$MAX_RETRIES..."
              if curl -sf --max-time 10 http://localhost/health > /dev/null 2>&1; then
                echo "✅ Health check prošao!"
                exit 0
              fi
              echo "   Nema odgovora, čekam ${RETRY_INTERVAL}s..."
              sleep $RETRY_INTERVAL
            done

            echo "❌ Health check NEUSPJEŠAN nakon $MAX_RETRIES pokušaja!"
            # Ispis logova za debugging
            cd "${{ secrets.STAGING_APP_DIR }}/docker"
            docker compose -f docker-compose.prod.yml logs --tail=50 app
            exit 1

      - name: Sažetak staging deploya
        if: success()
        run: |
          echo "### ✅ Staging deploy uspješan" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Server:** ${{ secrets.STAGING_SSH_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`${{ needs.check-config.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pokrenuo:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy na Produkciju (pri kreaciji v* taga)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Produkcija
    runs-on: ubuntu-latest
    needs: [check-config, docker-push]
    # Pokreni samo za verzijske tagove (v1.2.3) I ako su production secrets konfigurisani
    if: |
      always() &&
      (needs.docker-push.result == 'success' || needs.docker-push.result == 'skipped') &&
      needs.check-config.outputs.has_production == 'true' &&
      (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'))
    environment:
      name: production

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Deploy na produkciju via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || 22 }}
          connect_timeout: 30s
          command_timeout: 15m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.PRODUCTION_APP_DIR }}"
            IMAGE_TAG="${{ needs.check-config.outputs.image_tag }}"

            echo "========================================="
            echo " AI Learning System — PRODUKCIJA Deploy"
            echo " Tag: $IMAGE_TAG"
            echo " Datum: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "========================================="

            cd "$APP_DIR"

            # Backup trenutnog stanja za rollback
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "$PREVIOUS_COMMIT" > /tmp/ai-learning-previous-commit
            echo "Prethodni commit: $PREVIOUS_COMMIT"

            # Za tag deploy — checkout specifičnog taga
            echo "→ git fetch + checkout taga..."
            git fetch --tags origin
            git checkout "$IMAGE_TAG" 2>/dev/null || git reset --hard "origin/main"

            # Pull images sa registrija
            echo "→ docker compose pull..."
            cd docker
            docker compose -f docker-compose.prod.yml pull || true

            # Blue-green ili rolling restart
            echo "→ Rolling restart servisa..."
            IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.prod.yml up -d \
              --build \
              --remove-orphans \
              --no-deps

            # Čišćenje starih images (čuvaj zadnje 3 verzije)
            docker image prune -f

            echo "✅ Produkcijski deploy završen!"

      - name: Health check produkcija
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || 22 }}
          connect_timeout: 30s
          command_timeout: 3m
          script: |
            set -euo pipefail
            echo "→ Čekanje na inicijalizaciju (45s)..."
            sleep 45

            MAX_RETRIES=6
            RETRY_INTERVAL=15
            for i in $(seq 1 $MAX_RETRIES); do
              echo "Health check pokušaj $i/$MAX_RETRIES..."
              if curl -sf --max-time 15 http://localhost/health > /dev/null 2>&1; then
                HEALTH_RESP=$(curl -s http://localhost/health)
                echo "✅ Health check prošao! Odgovor: $HEALTH_RESP"
                exit 0
              fi
              echo "   Nema odgovora, čekam ${RETRY_INTERVAL}s..."
              sleep $RETRY_INTERVAL
            done

            # Automatski rollback ako health check ne prođe
            echo "❌ Health check NEUSPJEŠAN! Pokretanje rollback-a..."
            APP_DIR="${{ secrets.PRODUCTION_APP_DIR }}"
            cd "$APP_DIR/docker"

            if [ -f /tmp/ai-learning-previous-commit ]; then
              PREV=$(cat /tmp/ai-learning-previous-commit)
              echo "→ Rollback na commit: $PREV"
              cd "$APP_DIR"
              git checkout "$PREV"
              cd docker
              docker compose -f docker-compose.prod.yml up -d --build
              echo "⚠️ Rollback završen. Provjeri logove!"
            fi

            docker compose -f docker-compose.prod.yml logs --tail=100 app
            exit 1

      - name: Kreiranje GitHub Release-a
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## Deploy info
            - **Produkcijski server:** ${{ secrets.PRODUCTION_SSH_HOST }}
            - **Deploy datum:** ${{ github.run_started_at }}
            - **Pokrenuo:** ${{ github.actor }}

      - name: Sažetak produkcijskog deploya
        if: success()
        run: |
          echo "### 🚀 Produkcijski deploy uspješan" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Server:** ${{ secrets.PRODUCTION_SSH_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Verzija:** \`${{ needs.check-config.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pokrenuo:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────────
  # Notifikacija o statusu (opcionalno — potreban SLACK_WEBHOOK_URL secret)
  # ────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notifikacija
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result != 'skipped' || needs.deploy-production.result != 'skipped')
    steps:
      - name: Slack notifikacija
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
          fields: repo,message,commit,author,ref,workflow
          text: |
            *AI Learning System* deploy završen
            Staging: ${{ needs.deploy-staging.result || 'preskočen' }}
            Produkcija: ${{ needs.deploy-production.result || 'preskočena' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
