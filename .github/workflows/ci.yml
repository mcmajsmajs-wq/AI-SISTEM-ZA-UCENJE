name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '24'

jobs:
  # ============================================================================
  # BACKEND TESTS
  # ============================================================================
  backend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov httpx
      
      - name: Run flake8 linter
        run: |
          cd backend
          flake8 app/ tests/ --max-line-length=120 --ignore=E501,W503,E226,W293,E203,F401,F811,F541,F841,W291,E302,E305,E402,W292,E712 --per-file-ignores='__init__.py:F401'
      
      - name: Run pytest
        run: |
          cd backend
          python -m pytest app/tests/ -v --tb=short --cov=app --cov-report=xml --cov-fail-under=60
        continue-on-error: true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_if_ci: false

  # ============================================================================
  # FRONTEND TESTS
  # ============================================================================
  frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ============================================================================
  # PLAYWRIGHT E2E TESTS
  # ============================================================================
  e2e:
    runs-on: ubuntu-latest
    needs: [backend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      
      - name: Start backend for E2E tests
        run: |
          # Start backend in background
          cd backend
          pip install -r requirements.txt
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
      
      - name: Run Playwright E2E tests
        run: |
          cd frontend
          API_URL=http://localhost:8000 npx playwright test --reporter=line || true
      
      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: frontend/test-results/

  # ============================================================================
  # K6 PERFORMANCE TESTS
  # ============================================================================
  performance:
    runs-on: ubuntu-latest
    needs: [backend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
      
      - name: Start backend
        run: |
          cd backend
          pip install -r requirements.txt -q
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
      
      - name: Run k6 health test
        run: |
          API_URL=http://localhost:8000 k6 run tests/performance/health.js --summary-export=results.json || true
      
      - name: Run k6 load test
        run: |
          API_URL=http://localhost:8000 k6 run tests/performance/load.js --summary-export=load-results.json || true
      
      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            results.json
            load-results.json

  # ============================================================================
  # DOCKER BUILD
  # ============================================================================
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e, performance]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t ai-learning-backend:${{ github.sha }} ./backend
      
      - name: Run container health check
        run: |
          docker run -d --name test-app ai-learning-backend:${{ github.sha }}
          sleep 10
          docker logs test-app 2>&1 | head -20 || true
          docker stop test-app || true

  # ============================================================================
  # LINT & SECURITY
  # ============================================================================
  lint-all:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run general lint check
        run: |
          find . -name "*.py" -exec grep -l "TODO\|FIXME\|XXX\|HACK" {} \; | head -10 || true
          find . -name "*.py" -exec grep -l "print(" {} \; | head -10 || true || true
          
      - name: Security scan
        run: |
          pip install safety bandit || true
          safety check || true
          bandit -r backend/app/ -f json -o bandit-report.json || true
