name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Backend: lint + tests
  # ──────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 app \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501 \
            --exclude=app/db/migrations

      - name: Run unit tests
        env:
          DATABASE_URL: sqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-32-chars-long!!
          ENVIRONMENT: testing
        run: |
          pytest app/tests/unit/ -v --tb=short --no-header

      - name: Run integration tests
        env:
          DATABASE_URL: sqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-32-chars-long!!
          ENVIRONMENT: testing
        run: |
          pytest app/tests/integration/ -v --tb=short --no-header

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-32-chars-long!!
          ENVIRONMENT: testing
        run: |
          pytest app/tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -q

  # ──────────────────────────────────────────────────────────────────────────────
  # Frontend: typecheck + build
  # ──────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────────
  # Docker: build check (samo na main)
  # ──────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t ai-learning-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build -t ai-learning-frontend:ci ./frontend
