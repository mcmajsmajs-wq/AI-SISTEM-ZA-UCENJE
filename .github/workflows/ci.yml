name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '24'

jobs:
  # ============================================================================
  # BACKEND TESTS
  # ============================================================================
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: ai_learning_user
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: ai_learning_db
        options: >-
          --health-cmd "pg_isready -U ai_learning_user -d ai_learning_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov httpx

      - name: Run flake8 linter
        run: |
          cd backend
          flake8 app/ tests/ --max-line-length=120 --ignore=E501,W503,E226,W293,E203,F401,F811,F541,F841,W291,E302,E305,E402,W292,E712 --per-file-ignores='__init__.py:F401'

      - name: Run pytest
        run: |
          cd backend
          python -m pytest app/tests/ --tb=line -q --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=60
        env:
          DATABASE_URL: postgresql://ai_learning_user:ci_test_password@localhost:5432/ai_learning_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          JWT_ALGORITHM: HS256
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: '15'
          JWT_REFRESH_TOKEN_EXPIRE_DAYS: '7'
          ENVIRONMENT: testing
          LOG_LEVEL: WARNING
          OLLAMA_HOST: http://localhost:11434
          CORS_ORIGINS: '["http://localhost:3000","http://localhost:8080"]'

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          file: ./backend/coverage.xml
          fail_if_ci: false

  # ============================================================================
  # FRONTEND TESTS
  # ============================================================================
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build frontend
        run: |
          cd frontend
          VITE_API_URL=http://localhost:8000 npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  # ============================================================================
  # LINT & SECURITY
  # ============================================================================
  lint-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run general lint check
        run: |
          find . -name "*.py" -exec grep -l "TODO\|FIXME\|XXX\|HACK" {} \; | head -10 || true
          find . -name "*.py" -exec grep -l "print(" {} \; | head -10 || true

      - name: Security scan
        run: |
          pip install safety bandit || true
          safety check || true
          bandit -r backend/app/ -f json -o bandit-report.json || true

  # ============================================================================
  # PLAYWRIGHT E2E TESTS
  # ============================================================================
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: ai_learning_user
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: ai_learning_db
        options: >-
          --health-cmd "pg_isready -U ai_learning_user -d ai_learning_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npx playwright install chromium

      - name: Install Playwright system deps
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npx playwright install-deps chromium

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/dist

      - name: Start backend for E2E tests
        run: |
          cd backend
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
        env:
          DATABASE_URL: postgresql://ai_learning_user:ci_test_password@postgres:5432/ai_learning_db
          REDIS_URL: redis://redis:6379/0
          SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          JWT_ALGORITHM: HS256
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: '15'
          JWT_REFRESH_TOKEN_EXPIRE_DAYS: '7'
          ENVIRONMENT: testing
          LOG_LEVEL: WARNING
          CORS_ORIGINS: '["http://localhost:3000","http://localhost:8080"]'

      - name: Serve frontend
        run: |
          cd frontend
          npx vite preview --port 3000 &
          sleep 3
          for i in 1 2 3 4 5; do
            curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ && break
            echo "Waiting for frontend (attempt $i)..."
            sleep 3
          done

      - name: Run Playwright E2E tests
        run: |
          cd frontend
          npx playwright test --reporter=line
        env:
          API_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:3000

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: frontend/test-results/

  # ============================================================================
  # K6 PERFORMANCE TESTS
  # ============================================================================
  performance:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: ai_learning_user
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: ai_learning_db
        options: >-
          --health-cmd "pg_isready -U ai_learning_user -d ai_learning_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt -q

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start backend
        run: |
          cd backend
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
        env:
          DATABASE_URL: postgresql://ai_learning_user:ci_test_password@postgres:5432/ai_learning_db
          REDIS_URL: redis://redis:6379/0
          SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          JWT_ALGORITHM: HS256
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: '15'
          JWT_REFRESH_TOKEN_EXPIRE_DAYS: '7'
          ENVIRONMENT: testing
          LOG_LEVEL: WARNING
          CORS_ORIGINS: '["http://localhost:3000","http://localhost:8080"]'

      - name: Run k6 health test
        run: |
          API_URL=http://localhost:8000 k6 run tests/performance/health.js --summary-export=results.json || true

      - name: Run k6 load test
        run: |
          API_URL=http://localhost:8000 k6 run tests/performance/load.js --summary-export=load-results.json || true

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-results
          path: |
            results.json
            load-results.json

  # ============================================================================
  # DOCKER BUILD
  # ============================================================================
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e, performance]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and cache Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          tags: ai-learning-backend:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container health check
        run: |
          docker run -d --name test-app ai-learning-backend:${{ github.sha }}
          sleep 10
          docker logs test-app 2>&1 | head -20 || true
          docker stop test-app || true
