name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.10'
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov httpx
      
      - name: Run flake8 linter
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --ignore=E501,W503,E226,W293,E203 --per-file-ignores='__init__.py:F401'
      
      - name: Run pytest
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-fail-under=50
        continue-on-error: true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_if_ci: false

  frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t ai-learning-backend:${{ github.sha }} ./backend
          docker build -t ai-learning-frontend:${{ github.sha }} ./frontend
      
      - name: Run container health check
        run: |
          docker run -d --name test-app ai-learning-backend:${{ github.sha }}
          sleep 10
          docker logs test-app 2>&1 | head -20 || true
          docker stop test-app || true

  lint-all:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run general lint check
        run: |
          # Check for common issues
          find . -name "*.py" -exec grep -l "TODO\|FIXME\|XXX\|HACK" {} \; | head -10 || true
          find . -name "*.py" -exec grep -l "print(" {} \; | head -10 || true || true
          
      - name: Security scan
        run: |
          pip install safety bandit || true
          safety check || true
          bandit -r backend/app/ -f json -o bandit-report.json || true